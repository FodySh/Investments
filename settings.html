<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الإعدادات — محفظتي المالية</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#050e0a; --navy:#0a1a12; --card:#0f2218;
      --border:rgba(255,255,255,0.07);
      --gold:#c9a84c; --gold2:#e8c97a;
      --green:#00e676; --red:#ff4444;
      --muted:#8899bb; --white:#f0f4ff;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'IBM Plex Sans Arabic',sans-serif; background:var(--bg); color:var(--white); min-height:100vh; padding:24px 16px 80px; }
    #login-banner { position:fixed; inset:0; background:rgba(5,14,10,0.98); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:200; }
    .google-btn { background:#fff; color:#222; border:none; border-radius:12px; padding:14px 28px; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:10px; font-family:'IBM Plex Sans Arabic',sans-serif; }
    .wrap { max-width:680px; margin:0 auto; }
    .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .top-bar h1 { font-size:22px; font-weight:700; color:var(--gold); }
    .back-btn { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.25); border-radius:10px; padding:9px 18px; color:var(--gold); font-family:inherit; font-size:13px; cursor:pointer; }
    .user-bar { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 20px; margin-bottom:24px; display:flex; align-items:center; gap:14px; }
    .avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold2)); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#0a1628; flex-shrink:0; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .section { background:var(--card); border:1px solid var(--border); border-radius:16px; margin-bottom:20px; overflow:hidden; }
    .sec-title { padding:15px 20px 13px; font-size:13px; font-weight:700; color:var(--gold); border-bottom:1px solid var(--border); }
    .tags-wrap { display:flex; flex-wrap:wrap; gap:8px; padding:14px 20px 8px; min-height:50px; }
    .tag { background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.2); border-radius:20px; padding:5px 10px 5px 14px; font-size:12px; color:var(--gold); display:flex; align-items:center; gap:6px; }
    .tag-x { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; line-height:1; padding:0; }
    .tag-x:hover { color:var(--red); }
    .add-row { display:flex; gap:8px; padding:8px 20px 14px; }
    .f-input { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:9px 14px; color:var(--white); font-family:inherit; font-size:13px; flex:1; outline:none; }
    .f-input:focus { border-color:var(--gold); }
    .add-btn { background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3); border-radius:10px; padding:9px 18px; color:var(--gold); font-family:inherit; font-size:13px; cursor:pointer; font-weight:600; }
    .save-btn { width:100%; background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0a1628; border:none; border-radius:14px; padding:15px; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; margin-top:8px; }
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(--navy); border:1px solid var(--green); border-radius:12px; padding:12px 24px; font-size:13px; color:var(--green); z-index:999; display:none; }
  </style>
</head>
<body>

<div id="login-banner">
  <div style="font-size:40px">⚙️</div>
  <div style="font-size:20px;font-weight:700;color:var(--gold)">إعدادات المحفظة</div>
  <div style="font-size:13px;color:var(--muted)">سجّل دخولك للوصول إلى إعداداتك</div>
  <button class="google-btn" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.3 30.2 0 24 0 14.6 0 6.6 5.5 2.7 13.6l7.8 6c1.8-5.4 6.8-10.1 13.5-10.1z"/>
      <path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.9 7.2l7.6 5.9c4.5-4.1 7.2-10.2 7.2-17.1z"/>
      <path fill="#FBBC05" d="M10.5 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.6l7.8-6z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2 1.4-4.7 2.2-7.6 2.2-6.6 0-12.2-4.5-14.2-10.5l-7.8 6C6.5 42.5 14.6 48 24 48z"/>
    </svg>
    تسجيل الدخول بـ Google
  </button>
</div>

<div id="app" style="display:none">
  <div class="wrap">
    <div class="top-bar">
      <h1>⚙️ الإعدادات</h1>
      <button class="back-btn" onclick="window.location.href='https://fodysh.github.io/Investments'">← التطبيق</button>
    </div>
    <div class="user-bar">
      <div class="avatar" id="s-av">؟</div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700" id="s-name">—</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px" id="s-email">—</div>
      </div>
      <span style="background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.25);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--green)">🔗 متصل</span>
    </div>

    <div class="section">
      <div class="sec-title">🏦 قائمة المنصات</div>
      <div class="tags-wrap" id="tg-platforms"></div>
      <div class="add-row">
        <input class="f-input" id="in-platforms" placeholder="اسم المنصة..." onkeydown="if(event.key==='Enter')add('platforms')"/>
        <button class="add-btn" onclick="add('platforms')">+ إضافة</button>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">🏛️ البنوك (للقروض)</div>
      <div class="tags-wrap" id="tg-banks"></div>
      <div class="add-row">
        <input class="f-input" id="in-banks" placeholder="اسم البنك..." onkeydown="if(event.key==='Enter')add('banks')"/>
        <button class="add-btn" onclick="add('banks')">+ إضافة</button>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">💰 مصادر رأس المال</div>
      <div class="tags-wrap" id="tg-capital"></div>
      <div class="add-row">
        <input class="f-input" id="in-capital" placeholder="مصدر رأس المال..." onkeydown="if(event.key==='Enter')add('capital')"/>
        <button class="add-btn" onclick="add('capital')">+ إضافة</button>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">📊 أنواع الاستثمار</div>
      <div class="tags-wrap" id="tg-types"></div>
      <div class="add-row">
        <input class="f-input" id="in-types" placeholder="نوع الاستثمار..." onkeydown="if(event.key==='Enter')add('types')"/>
        <button class="add-btn" onclick="add('types')">+ إضافة</button>
      </div>
    </div>

    <!-- جدول رسوم الوكالة -->
    <div class="section">
      <div class="sec-title">💼 رسوم الوكالة لكل منصة</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">تُستخدم للحساب التلقائي عند إضافة فرصة جديدة — يمكن تعديل المبلغ يدوياً في الفورم</div>
      <div style="overflow-x:auto">
        <table id="fees-table" style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="border-bottom:1px solid var(--border)">
              <th style="padding:8px 12px;text-align:right;color:var(--muted);font-weight:600">المنصة</th>
              <th style="padding:8px 12px;text-align:right;color:var(--muted);font-weight:600">رسوم الوكالة %</th>
              <th style="padding:8px 12px;text-align:right;color:var(--muted);font-weight:600">ملاحظة</th>
              <th style="padding:8px 6px;width:36px"></th>
            </tr>
          </thead>
          <tbody id="fees-tbody"></tbody>
        </table>
      </div>
      <div class="add-row" style="margin-top:12px;flex-wrap:wrap;gap:8px">
        <select id="in-fee-platform" class="f-input" style="flex:2;min-width:140px">
          <option value="">— اختر المنصة —</option>
        </select>
        <input class="f-input" id="in-fee-pct" type="number" step="0.01" min="0" max="100" placeholder="نسبة % مثال: 1.5" style="flex:1;min-width:100px"/>
        <input class="f-input" id="in-fee-note" type="text" placeholder="ملاحظة (اختياري)" style="flex:2;min-width:140px"/>
        <button class="add-btn" onclick="addFeeRow()">+ إضافة</button>
      </div>
    </div>

    <button class="save-btn" onclick="saveAll()">💾 حفظ جميع الإعدادات</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyAE9VvmxCorzJ8d1MUAZds6TyQC1gw67ME",
  authDomain:        "investments-page.firebaseapp.com",
  projectId:         "investments-page",
  storageBucket:     "investments-page.firebasestorage.app",
  messagingSenderId: "964948881361",
  appId:             "1:964948881361:web:2801b8127489d953717af0"
});
var auth=firebase.auth(), db=firebase.firestore();
var prov=new firebase.auth.GoogleAuthProvider();
prov.setCustomParameters({prompt:'select_account'});

var D = {
  platformFees: [], // [{platform, pct, note}]
  platforms:['ترميز','منافع','دراية','ابيان','عوائد','منصة الأهلي','رياض المالية','الراجحي المالية','بنك البلاد','انجاز','سدر','تداول','أخرى'],
  banks:['البنك الأهلي السعودي','بنك الراجحي','بنك الرياض','البنك السعودي الفرنسي','بنك البلاد','بنك الجزيرة','البنك السعودي للاستثمار','بنك الإمارات دبي الوطني','بنك الإنماء','بنك الخليج الدولي (ميم)','أخرى'],
  capital:['مدخرات شخصية','راتب','استثمار سابق','هبة / إرث','قرض','شريك'],
  types:['صك','صندوق','سهم','سند','مرابحة','وديعة','عقار','مشروع','عقد آجل','أخرى']
};
var uid=null;

function signIn(){ auth.signInWithPopup(prov).catch(function(e){toast('❌ '+e.message,1);}); }

auth.onAuthStateChanged(function(u){
  if(u){
    uid=u.uid;
    document.getElementById('login-banner').style.display='none';
    document.getElementById('app').style.display='block';
    var av=document.getElementById('s-av');
    if(u.photoURL) av.innerHTML='<img src="'+u.photoURL+'"/>';
    else av.textContent=(u.displayName||'؟')[0];
    document.getElementById('s-name').textContent=u.displayName||'—';
    document.getElementById('s-email').textContent=u.email||'—';
    load();
  } else {
    document.getElementById('login-banner').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

function load(){
  db.collection('users').doc(uid).collection('portfolio').doc('settings')
    .get().then(function(s){
      if(s.exists && s.data().lists){
        var sv=s.data().lists;
        Object.keys(D).forEach(function(k){
          if(k==='platformFees') {
            if(sv[k] && Array.isArray(sv[k])) D[k] = sv[k];
          } else {
            if(sv[k]&&sv[k].length) D[k]=sv[k];
          }
        });
      }
      renderAll();
    }).catch(function(e){ console.warn('Failed to load settings from Firestore:', e.message); renderAll(); });
}

function saveAll(){
  if(!uid) return;
  db.collection('users').doc(uid).collection('portfolio').doc('settings')
    .set({lists:D, updatedAt:new Date().toISOString()},{merge:true})
    .then(function(){ toast('✅ تم الحفظ بنجاح'); })
    .catch(function(e){ toast('❌ '+e.message,1); });
}

function renderAll(){
  Object.keys(D).forEach(function(k){ if(k!=='platformFees') render(k); });
  renderFeesTable();
  populatePlatformFeeSelect();
}

function render(k){
  var el=document.getElementById('tg-'+k);
  if(!el) return;
  el.innerHTML=D[k].map(function(v,i){
    return '<div class="tag"><span>'+v+'</span><button class="tag-x" onclick="del(\''+k+'\','+i+')">×</button></div>';
  }).join('');
}

function add(k){
  var inp=document.getElementById('in-'+k);
  var v=(inp.value||'').trim();
  if(!v) return;
  if(D[k].indexOf(v)!==-1){ toast('⚠️ موجود مسبقاً'); inp.value=''; return; }
  D[k].push(v); inp.value=''; render(k);
}

function del(k,i){ D[k].splice(i,1); render(k); }

function renderFeesTable() {
  var tbody = document.getElementById('fees-tbody');
  if (!tbody) return;
  tbody.innerHTML = (D.platformFees||[]).map(function(row, i) {
    return '<tr style="border-bottom:1px solid rgba(255,255,255,0.04)">' +
      '<td style="padding:8px 12px;font-weight:600">' + row.platform + '</td>' +
      '<td style="padding:8px 12px">' +
        '<input type="number" step="0.01" min="0" max="100" value="' + row.pct + '" ' +
        'onchange="D.platformFees['+i+'].pct=parseFloat(this.value)||0" ' +
        'style="width:90px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--gold);font-family:monospace;font-size:13px;font-weight:700;outline:none"> %' +
      '</td>' +
      '<td style="padding:8px 12px">' +
        '<input type="text" value="' + (row.note||'') + '" placeholder="—" ' +
        'onchange="D.platformFees['+i+'].note=this.value" ' +
        'style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--muted);font-size:12px;outline:none">' +
      '</td>' +
      '<td style="padding:8px 6px;text-align:center">' +
        '<button onclick="delFee('+i+')" style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.2);border-radius:5px;padding:3px 8px;cursor:pointer;color:#f87171;font-size:11px">✕</button>' +
      '</td>' +
    '</tr>';
  }).join('') || '<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--muted);font-size:12px">لا توجد رسوم مضافة — أضف منصة أدناه</td></tr>';
}

function addFeeRow() {
  var platform = document.getElementById('in-fee-platform').value;
  var pct = parseFloat(document.getElementById('in-fee-pct').value) || 0;
  var note = document.getElementById('in-fee-note').value.trim();
  if (!platform) { toast('⚠️ اختر المنصة'); return; }
  if (pct <= 0)  { toast('⚠️ أدخل النسبة'); return; }
  // Check if platform already exists
  var existing = (D.platformFees||[]).findIndex(function(r){ return r.platform === platform; });
  if (existing !== -1) {
    D.platformFees[existing] = { platform, pct, note };
    toast('✅ تم تحديث رسوم ' + platform);
  } else {
    if (!D.platformFees) D.platformFees = [];
    D.platformFees.push({ platform, pct, note });
    toast('✅ تمت الإضافة');
  }
  document.getElementById('in-fee-pct').value = '';
  document.getElementById('in-fee-note').value = '';
  document.getElementById('in-fee-platform').value = '';
  renderFeesTable();
}

function delFee(i) {
  D.platformFees.splice(i, 1);
  renderFeesTable();
}

function populatePlatformFeeSelect() {
  var sel = document.getElementById('in-fee-platform');
  if (!sel) return;
  sel.innerHTML = '<option value="">— اختر المنصة —</option>' +
    (D.platforms||[]).map(function(p) {
      return '<option value="' + p + '">' + p + '</option>';
    }).join('');
}

function toast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=err?'var(--red)':'var(--green)';
  t.style.color=err?'var(--red)':'var(--green)';
  t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
}
</script>
</body>
</html>
