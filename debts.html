<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>الديون والجمعيات — محفظتي المالية</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#050e0a; --navy:#0a1a12; --navy2:#0d2118; --card:#0f2218;
      --border:rgba(255,255,255,0.07); --sidebar-bg:#0a1a12;
      --gold:#c9a84c; --gold2:#e8c97a; --green:#00e676; --cyan:#00d4ff;
      --red:#ff4444; --orange:#ff9800; --purple:#a78bfa;
      --muted:#8899bb; --white:#f0f4ff;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'IBM Plex Sans Arabic',sans-serif; background:var(--bg); color:var(--white); min-height:100vh; padding:16px 16px 80px; }
    .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding:12px 0; border-bottom:1px solid var(--border); }
    .top-bar h1 { font-size:20px; font-weight:700; }
    .back-btn { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.25); border-radius:10px; padding:8px 16px; color:var(--gold); font-family:inherit; font-size:13px; cursor:pointer; text-decoration:none; }
    .section-card { background:var(--card); border:1px solid var(--border); border-radius:16px; margin-bottom:20px; overflow:hidden; }
    .section-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); }
    .section-title { font-size:14px; font-weight:700; }
    .section-count { background:rgba(255,255,255,0.06); border-radius:20px; padding:3px 10px; font-size:11px; color:var(--muted); }
    .btn-submit { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0a1628; border:none; border-radius:12px; padding:11px 24px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; }
    .btn-reset  { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; padding:11px 24px; font-size:13px; color:var(--muted); font-family:inherit; cursor:pointer; }
    .f-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--white); font-family:inherit; font-size:13px; outline:none; transition:border-color .2s; }
    .f-input:focus { border-color:var(--gold); }
    .f-select { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--white); font-family:inherit; font-size:13px; outline:none; }
    .f-textarea { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--white); font-family:inherit; font-size:13px; outline:none; resize:vertical; min-height:80px; }
    .field-label { font-size:12px; color:var(--muted); margin-bottom:6px; display:block; }
    .field-group { display:flex; flex-direction:column; }
    .form-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:14px; }
    .form-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:14px; }
    .loan-action-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:11px; color:var(--muted); cursor:pointer; font-family:inherit; }
    .table-wrap { overflow-x:auto; }
    .data-table { width:100%; border-collapse:collapse; font-size:12px; }
    .data-table th { padding:10px 12px; background:rgba(255,255,255,0.03); color:var(--muted); font-weight:600; text-align:right; white-space:nowrap; }
    .data-table td { padding:10px 12px; border-top:1px solid rgba(255,255,255,0.04); }
    .mono { font-family:'JetBrains Mono',monospace; }
    .up { color:var(--green); } .dn { color:var(--red); }
    .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
    .kpi-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 18px; text-align:center; }
    .kpi-label { font-size:10px; color:var(--muted); margin-bottom:6px; }
    .kpi-value { font-size:22px; font-weight:800; font-family:monospace; }
    .kpi-sub { font-size:10px; color:var(--muted); margin-top:4px; }
    .filter-btn { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:12px; color:var(--muted); cursor:pointer; font-family:inherit; transition:all .2s; }
    .filter-btn.active { background:rgba(201,168,76,0.15); border-color:rgba(201,168,76,0.4); color:var(--gold); }
    .pill { border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; }
    .pill-green { background:rgba(0,230,118,0.1); color:var(--green); }
    .pill-red   { background:rgba(255,68,68,0.1);  color:var(--red); }
    .pill-gold  { background:rgba(201,168,76,0.1); color:var(--gold); }
    .pill-muted { background:rgba(136,153,187,0.1); color:var(--muted); }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--navy); border:1px solid var(--green); border-radius:12px; padding:12px 24px; font-size:13px; color:var(--green); z-index:999; display:none; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
    #login-banner { position:fixed; inset:0; background:rgba(5,14,10,0.97); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:200; }
    .google-btn { background:#fff; color:#222; border:none; border-radius:12px; padding:14px 28px; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:10px; font-family:'IBM Plex Sans Arabic',sans-serif; }
    @media(max-width:640px){ .kpi-grid{grid-template-columns:repeat(2,1fr);} .form-grid,.form-grid-3{grid-template-columns:1fr;} }
  </style>
</head>
<body>

<div id="login-banner">
  <div style="font-size:40px">💸</div>
  <div style="font-size:20px;font-weight:700;color:var(--gold)">الديون والجمعيات</div>
  <div style="font-size:13px;color:var(--muted)">سجّل دخولك للوصول إلى بياناتك</div>
  <button class="google-btn" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.3 30.2 0 24 0 14.6 0 6.6 5.5 2.7 13.6l7.8 6c1.8-5.4 6.8-10.1 13.5-10.1z"/>
      <path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.9 7.2l7.6 5.9c4.5-4.1 7.2-10.2 7.2-17.1z"/>
      <path fill="#FBBC05" d="M10.5 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.6l7.8-6z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2 1.4-4.7 2.2-7.6 2.2-6.6 0-12.2-4.5-14.2-10.5l-7.8 6C6.5 42.5 14.6 48 24 48z"/>
    </svg>
    تسجيل الدخول بـ Google
  </button>
</div>

<div id="app" style="max-width:900px;margin:0 auto;display:none">
  <div class="top-bar">
    <h1>💸 الديون والجمعيات</h1>
    <button class="back-btn" onclick="window.location.href='https://fodysh.github.io/Investments'">← المحفظة</button>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">عليّ (مدين)</div>
      <div class="kpi-value" id="debts-owe" style="color:var(--red)">0</div>
      <div class="kpi-sub">ر.س</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">لي (دائن)</div>
      <div class="kpi-value" id="debts-owed-to-me" style="color:var(--green)">0</div>
      <div class="kpi-sub">ر.س</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">الصافي</div>
      <div class="kpi-value" id="debts-net">0</div>
      <div class="kpi-sub" id="debts-net-label">ر.س</div>
    </div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)">
    <button id="dt-tab-debts" onclick="switchTab('debts')" style="padding:11px 22px;font-size:13px;font-weight:700;font-family:inherit;border:none;border-bottom:3px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer">💸 الديون</button>
    <button id="dt-tab-jamaa" onclick="switchTab('jamaa')" style="padding:11px 22px;font-size:13px;font-weight:700;font-family:inherit;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--muted);cursor:pointer">🤝 الجمعيات</button>
  </div>

  <!-- Debts Panel -->
  <div id="panel-debts">
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
      <button class="filter-btn" onclick="setFilter('owe',this)">⬇️ عليّ</button>
      <button class="filter-btn" onclick="setFilter('lend',this)">⬆️ لي</button>
      <button class="filter-btn" onclick="setFilter('settled',this)">✅ مسوّى</button>
      <div style="flex:1"></div>
      <span id="debts-list-count" style="font-size:11px;color:var(--muted)"></span>
      <button class="btn-submit" onclick="showAddForm()" style="font-size:12px;padding:8px 18px">➕ إضافة دين</button>
    </div>
    <div id="debts-cards"></div>
  </div>

  <!-- Jamaa Panel -->
  <div id="panel-jamaa" style="display:none">
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn-submit" onclick="showJamaaForm()" style="font-size:12px;padding:8px 18px">➕ إضافة جمعية</button>
    </div>
    <div id="jamaa-cards"></div>
  </div>

  <!-- Add/Edit Debt Form -->
  <div id="debt-form-wrap" style="display:none;position:fixed;inset:0;background:rgba(5,14,10,0.9);z-index:100;overflow-y:auto;padding:24px 16px">
    <div style="max-width:600px;margin:0 auto">
      <div class="section-card">
        <div class="section-head">
          <span class="section-title" id="debt-form-title">➕ إضافة دين</span>
          <button onclick="closeDebtForm()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">×</button>
        </div>
        <div style="padding:20px;display:flex;flex-direction:column;gap:14px">
          <div class="form-grid">
            <div class="field-group">
              <label class="field-label">الشخص <span style="color:var(--red)">*</span></label>
              <input class="f-input" id="ad-person" type="text" placeholder="اسم الشخص"/>
            </div>
            <div class="field-group">
              <label class="field-label">العلاقة</label>
              <input class="f-input" id="ad-relation" type="text" placeholder="صديق، أخ، زميل..."/>
            </div>
          </div>
          <div class="form-grid">
            <div class="field-group">
              <label class="field-label">الاتجاه <span style="color:var(--red)">*</span></label>
              <select class="f-select" id="ad-direction" onchange="updateLabel()">
                <option value="owe">👆 عليّ (أنا المدين)</option>
                <option value="lend">👇 له عندي (هو المدين)</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">السبب / الغرض</label>
              <input class="f-input" id="ad-reason" type="text" placeholder="مثال: قرض للسفر"/>
            </div>
          </div>
          <div class="form-grid">
            <div class="field-group">
              <label class="field-label" id="ad-amount-label">المبلغ الكلي (ر.س) <span style="color:var(--red)">*</span></label>
              <input class="f-input" id="ad-amount" type="number" step="0.01" placeholder="0.00" oninput="calcDebt()"/>
            </div>
            <div class="field-group">
              <label class="field-label">المبلغ المسدد (ر.س)</label>
              <input class="f-input" id="ad-paid" type="number" step="0.01" placeholder="0.00" oninput="calcDebt()"/>
            </div>
          </div>
          <div class="form-grid">
            <div class="field-group">
              <label class="field-label">تاريخ الدين</label>
              <input class="f-input" id="ad-date" type="date"/>
            </div>
            <div class="field-group">
              <label class="field-label">تاريخ الاستحقاق</label>
              <input class="f-input" id="ad-due" type="date"/>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">رقم الجوال (للواتساب)</label>
            <input class="f-input" id="ad-phone" type="tel" placeholder="05xxxxxxxx"/>
          </div>
          <div class="field-group">
            <label class="field-label">الحالة</label>
            <select class="f-select" id="ad-status">
              <option value="قائم">🔴 قائم</option>
              <option value="جزئي">🟡 مسدد جزئياً</option>
              <option value="مسوَّى">✅ مسوَّى</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">ملاحظات</label>
            <textarea class="f-textarea" id="ad-notes" placeholder="تفاصيل إضافية..."></textarea>
          </div>
          <!-- Calc -->
          <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:12px;display:flex;gap:16px;flex-wrap:wrap">
            <div style="text-align:center;flex:1">
              <div style="font-size:10px;color:var(--muted);margin-bottom:4px">المتبقي</div>
              <div id="ad-c-remaining" style="font-size:18px;font-weight:800;font-family:monospace;color:var(--red)">—</div>
            </div>
            <div style="text-align:center;flex:1">
              <div style="font-size:10px;color:var(--muted);margin-bottom:4px">نسبة السداد</div>
              <div id="ad-c-pct" style="font-size:18px;font-weight:800;font-family:monospace;color:var(--green)">—</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:4px">
            <button class="btn-submit" onclick="saveDebt()" style="flex:1">💾 حفظ</button>
            <button class="btn-reset" onclick="closeDebtForm()">إلغاء</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyAE9VvmxCorzJ8d1MUAZds6TyQC1gw67ME",
  authDomain:        "investments-page.firebaseapp.com",
  projectId:         "investments-page",
  storageBucket:     "investments-page.firebasestorage.app",
  messagingSenderId: "964948881361",
  appId:             "1:964948881361:web:2801b8127489d953717af0"
});
var auth = firebase.auth();
var db   = firebase.firestore();
var prov = new firebase.auth.GoogleAuthProvider();
prov.setCustomParameters({ prompt:'select_account' });

var debtsData = [];
var jamaaData = [];
var uid       = null;
var _editing  = null;
var _currentFilter = 'all';
var _currentTab    = 'debts';

// ══ Auth ═══════════════════════════════════════════════════════
function signIn() { auth.signInWithPopup(prov).catch(function(e){ toast('❌ '+e.message,1); }); }

auth.onAuthStateChanged(function(user) {
  if (user) {
    uid = user.uid;
    document.getElementById('login-banner').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-banner').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ══ Firebase helpers ════════════════════════════════════════════
function ref(col) {
  return db.collection('users').doc(uid).collection('portfolio').doc(col);
}
function save(col, data) {
  return ref(col).set({ data: data, updatedAt: new Date() }, { merge: true });
}

// ══ Load ════════════════════════════════════════════════════════
function loadData() {
  Promise.all([
    ref('debts').get(),
    ref('jamaa').get().catch(function(){ return null; })
  ]).then(function(results) {
    var ds = results[0]; var js = results[1];
    if (ds.exists && Array.isArray(ds.data().data)) debtsData = ds.data().data;
    if (js && js.exists && Array.isArray(js.data().data)) jamaaData = js.data().data;
    renderAll();
  }).catch(function(e){ toast('❌ خطأ في التحميل: '+e.message,1); });
}

// ══ Render ══════════════════════════════════════════════════════
function renderAll() { updateKPIs(); renderDebts(); renderJamaa(); }

function updateKPIs() {
  var owe  = debtsData.filter(function(d){ return d.direction==='owe'&&d.status!=='مسوَّى'; }).reduce(function(s,d){ return s+(d.remaining||d.amount||0); },0);
  var lend = debtsData.filter(function(d){ return d.direction==='lend'||d.direction==='owed'; }).filter(function(d){ return d.status!=='مسوَّى'; }).reduce(function(s,d){ return s+(d.remaining||d.amount||0); },0);
  var net  = lend - owe;
  var fmt  = function(n){ return n.toLocaleString('en-US',{maximumFractionDigits:0}); };
  document.getElementById('debts-owe').textContent       = fmt(owe);
  document.getElementById('debts-owed-to-me').textContent= fmt(lend);
  var netEl = document.getElementById('debts-net');
  netEl.textContent = fmt(Math.abs(net));
  netEl.style.color = net>=0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('debts-net-label').textContent = net>=0 ? '✅ رصيدك إيجابي' : '⚠️ رصيدك سلبي';
}

function renderDebts() {
  var filtered = debtsData.map(function(d,i){ return Object.assign({},d,{_idx:i}); });
  if (_currentFilter==='owe')     filtered = filtered.filter(function(d){ return d.direction==='owe'&&d.status!=='مسوَّى'; });
  if (_currentFilter==='lend')    filtered = filtered.filter(function(d){ return (d.direction==='lend'||d.direction==='owed')&&d.status!=='مسوَّى'; });
  if (_currentFilter==='settled') filtered = filtered.filter(function(d){ return d.status==='مسوَّى'; });

  var el = document.getElementById('debts-list-count');
  if (el) el.textContent = filtered.length + ' معاملة';
  var cards = document.getElementById('debts-cards');
  if (!cards) return;

  if (!filtered.length) {
    cards.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted)">لا توجد سجلات</div>';
    return;
  }

  cards.innerHTML = filtered.map(function(d) {
    var isOwe = d.direction === 'owe';
    var rem   = d.remaining != null ? d.remaining : (d.amount||0) - (d.paid||0);
    var pct   = d.amount > 0 ? Math.min(100,(((d.paid||0)/d.amount)*100)).toFixed(0) : 0;
    var statusColor = d.status==='مسوَّى'?'var(--green)':d.status==='جزئي'?'var(--orange)':'var(--red)';
    var phone = (d.phone||'').replace(/\D/g,'');
    var wa    = phone ? 'https://wa.me/966' + phone.replace(/^0/,'') + '?text=' + encodeURIComponent('السلام عليكم، بخصوص مبلغ '+((d.amount||0).toLocaleString('en-US'))+' ر.س') : '';

    return '<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      + '<div>'
      + '<span style="font-size:15px;font-weight:700">' + (d.person||'—') + '</span>'
      + (d.relation ? '<span style="font-size:11px;color:var(--muted);margin-right:8px">· '+d.relation+'</span>' : '')
      + '</div>'
      + '<span style="font-size:11px;font-weight:600;color:'+statusColor+'">'+( d.status||'قائم')+'</span>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      + '<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:'+(isOwe?'rgba(255,68,68,0.1)':'rgba(0,230,118,0.1)')+';color:'+(isOwe?'var(--red)':'var(--green)')+'">'
      + (isOwe ? '⬇️ عليّ' : '⬆️ يدين لك') + '</span>'
      + (d.reason ? '<span style="font-size:11px;color:var(--muted)">· '+d.reason+'</span>' : '')
      + '</div>'
      + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">'
      + '<div style="text-align:center"><div style="font-size:9px;color:var(--muted)">الكلي</div><div style="font-family:monospace;font-weight:700">'+(d.amount||0).toLocaleString('en-US',{minimumFractionDigits:0})+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:9px;color:var(--muted)">المسدد</div><div style="font-family:monospace;color:var(--green)">'+(d.paid||0).toLocaleString('en-US',{minimumFractionDigits:0})+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:9px;color:var(--muted)">المتبقي</div><div style="font-family:monospace;font-weight:800;color:'+(rem>0?'var(--red)':'var(--green)')+'">'+rem.toLocaleString('en-US',{minimumFractionDigits:0})+'</div></div>'
      + '</div>'
      + '<div style="height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin-bottom:10px"><div style="height:100%;background:var(--green);border-radius:3px;width:'+pct+'%"></div></div>'
      + '<div style="display:flex;gap:6px;flex-wrap:wrap">'
      + '<button class="loan-action-btn" onclick="editDebt('+d._idx+')" style="color:var(--gold)">✏️ تعديل</button>'
      + '<button class="loan-action-btn" onclick="markSettled('+d._idx+')" style="color:var(--green)">✅ مسوَّى</button>'
      + (wa ? '<a href="'+wa+'" target="_blank" class="loan-action-btn" style="color:var(--green);text-decoration:none">📱 واتساب</a>' : '')
      + '<button class="loan-action-btn" onclick="deleteDebt('+d._idx+')" style="color:var(--red)">🗑</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

function renderJamaa() {
  var el = document.getElementById('jamaa-cards');
  if (!el) return;
  if (!jamaaData.length) {
    el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted)">لا توجد جمعيات</div>';
    return;
  }
  el.innerHTML = jamaaData.map(function(j,i) {
    var total = (j.monthly||0) * (j.members||0);
    return '<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      + '<span style="font-size:15px;font-weight:700">'+( j.name||'جمعية')+'</span>'
      + '<span style="font-size:11px;color:var(--muted)">'+( j.status||'نشطة')+'</span>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">'
      + '<div style="text-align:center"><div style="font-size:9px;color:var(--muted)">القسط الشهري</div><div style="font-family:monospace;color:var(--gold)">'+(j.monthly||0).toLocaleString('en-US')+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:9px;color:var(--muted)">الأعضاء</div><div style="font-family:monospace;color:var(--cyan)">'+(j.members||0)+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:9px;color:var(--muted)">إجمالي الجمعية</div><div style="font-family:monospace;font-weight:800;color:var(--green)">'+total.toLocaleString('en-US')+'</div></div>'
      + '</div>'
      + '<div style="display:flex;gap:6px">'
      + '<button class="loan-action-btn" onclick="editJamaa('+i+')" style="color:var(--gold)">✏️</button>'
      + '<button class="loan-action-btn" onclick="deleteJamaa('+i+')" style="color:var(--red)">🗑</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ══ Tabs & Filters ════════════════════════════════════════════
function switchTab(tab) {
  _currentTab = tab;
  document.getElementById('panel-debts').style.display  = tab==='debts' ? '' : 'none';
  document.getElementById('panel-jamaa').style.display  = tab==='jamaa' ? '' : 'none';
  var gold  = 'border-bottom:3px solid var(--gold);color:var(--gold);';
  var muted = 'border-bottom:3px solid transparent;color:var(--muted);';
  document.getElementById('dt-tab-debts').style.cssText += tab==='debts' ? gold : muted;
  document.getElementById('dt-tab-jamaa').style.cssText += tab==='jamaa' ? gold : muted;
}

function setFilter(f, btn) {
  _currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderDebts();
}

// ══ Add/Edit Debt ════════════════════════════════════════════
function showAddForm() {
  _editing = null;
  document.getElementById('debt-form-title').textContent = '➕ إضافة دين';
  ['ad-person','ad-relation','ad-reason','ad-phone','ad-notes'].forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  ['ad-amount','ad-paid'].forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  document.getElementById('ad-direction').value = 'owe';
  document.getElementById('ad-status').value    = 'قائم';
  document.getElementById('ad-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('ad-due').value  = '';
  document.getElementById('ad-c-remaining').textContent = '—';
  document.getElementById('ad-c-pct').textContent = '—';
  document.getElementById('debt-form-wrap').style.display = 'block';
  updateLabel();
}

function editDebt(idx) {
  var d = debtsData[idx];
  if (!d) return;
  _editing = idx;
  document.getElementById('debt-form-title').textContent = '✏️ تعديل دين';
  document.getElementById('ad-person').value    = d.person    || '';
  document.getElementById('ad-relation').value  = d.relation  || '';
  document.getElementById('ad-reason').value    = d.reason    || '';
  document.getElementById('ad-phone').value     = d.phone     || '';
  document.getElementById('ad-notes').value     = d.notes     || '';
  document.getElementById('ad-amount').value    = d.amount    || '';
  document.getElementById('ad-paid').value      = d.paid      || '';
  document.getElementById('ad-direction').value = d.direction || 'owe';
  document.getElementById('ad-status').value    = d.status    || 'قائم';
  document.getElementById('ad-date').value      = d.date      || '';
  document.getElementById('ad-due').value       = d.due_date  || '';
  calcDebt();
  document.getElementById('debt-form-wrap').style.display = 'block';
  updateLabel();
}

function closeDebtForm() { document.getElementById('debt-form-wrap').style.display = 'none'; }

function updateLabel() {
  var dir = document.getElementById('ad-direction').value;
  document.getElementById('ad-amount-label').innerHTML = (dir==='owe'?'المبلغ الذي عليّ':'المبلغ الذي له عندي') + ' (ر.س) <span style="color:var(--red)">*</span>';
}

function calcDebt() {
  var amt  = parseFloat(document.getElementById('ad-amount').value) || 0;
  var paid = parseFloat(document.getElementById('ad-paid').value)   || 0;
  var rem  = Math.max(0, amt - paid);
  var pct  = amt > 0 ? ((paid/amt)*100).toFixed(0) : 0;
  document.getElementById('ad-c-remaining').textContent = rem.toLocaleString('en-US',{minimumFractionDigits:2}) + ' ر.س';
  document.getElementById('ad-c-pct').textContent       = pct + '%';
}

function saveDebt() {
  var person = (document.getElementById('ad-person').value||'').trim();
  if (!person) { toast('❌ أدخل اسم الشخص',1); return; }
  var amt = parseFloat(document.getElementById('ad-amount').value) || 0;
  if (!amt) { toast('❌ أدخل المبلغ',1); return; }
  var paid  = parseFloat(document.getElementById('ad-paid').value) || 0;
  var debt  = {
    person:    person,
    relation:  document.getElementById('ad-relation').value,
    direction: document.getElementById('ad-direction').value,
    reason:    document.getElementById('ad-reason').value,
    phone:     document.getElementById('ad-phone').value,
    amount:    amt,
    paid:      paid,
    remaining: Math.max(0, amt - paid),
    status:    document.getElementById('ad-status').value,
    date:      document.getElementById('ad-date').value,
    due_date:  document.getElementById('ad-due').value,
    notes:     document.getElementById('ad-notes').value,
    updated:   new Date().toISOString()
  };
  if (_editing !== null) debtsData[_editing] = debt;
  else debtsData.push(debt);

  save('debts', debtsData).then(function() {
    toast('✅ تم الحفظ');
    closeDebtForm();
    renderAll();
  }).catch(function(e){ toast('❌ خطأ: '+e.message,1); });
}

function deleteDebt(idx) {
  if (!confirm('هل أنت متأكد من الحذف؟')) return;
  debtsData.splice(idx, 1);
  save('debts', debtsData).then(function(){ toast('✅ تم الحذف'); renderAll(); });
}

function markSettled(idx) {
  debtsData[idx].status    = 'مسوَّى';
  debtsData[idx].remaining = 0;
  debtsData[idx].paid      = debtsData[idx].amount;
  save('debts', debtsData).then(function(){ toast('✅ تم التسوية'); renderAll(); });
}

// ══ Jamaa ════════════════════════════════════════════════════
var _jamaaEditing = null;

function showJamaaForm(idx) {
  _jamaaEditing = idx != null ? idx : null;
  var j = idx != null ? jamaaData[idx] : {};
  var name = prompt('اسم الجمعية:', j.name||'');
  if (!name) return;
  var monthly = parseFloat(prompt('القسط الشهري (ر.س):', j.monthly||'') || 0);
  var members = parseInt(prompt('عدد الأعضاء:', j.members||'') || 0);
  if (!monthly || !members) { toast('⚠️ أكمل البيانات',1); return; }
  var jamaa = { name:name, monthly:monthly, members:members, status:(j.status||'نشطة'), created:j.created||new Date().toISOString() };
  if (_jamaaEditing !== null) jamaaData[_jamaaEditing] = jamaa;
  else jamaaData.push(jamaa);
  save('jamaa', jamaaData).then(function(){ toast('✅ تم الحفظ'); renderJamaa(); });
}

function editJamaa(idx) { showJamaaForm(idx); }

function deleteJamaa(idx) {
  if (!confirm('هل أنت متأكد؟')) return;
  jamaaData.splice(idx,1);
  save('jamaa', jamaaData).then(function(){ toast('✅ تم الحذف'); renderJamaa(); });
}

// ══ Toast ═════════════════════════════════════════════════════
function toast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = err ? 'var(--red)' : 'var(--green)';
  t.style.color       = err ? 'var(--red)' : 'var(--green)';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display='none'; }, 3000);
}
</script>
</body>
</html>
